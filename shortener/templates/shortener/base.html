<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortlinks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #888;
            margin-bottom: 2rem;
        }

        .url-input {
            width: 100%;
            padding: 1rem;
            border-radius: 10px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .url-input:focus { border-color: #667eea; }

        .btn {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .btn:hover { opacity: 0.9; }

        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #1a1a1a;
            border-radius: 10px;
            border: 2px solid #333;
        }

        .result-box p { color: #888; font-size: 0.9rem; margin-bottom: 0.5rem; }

        .short-url {
            font-size: 1.3rem;
            color: #667eea;
            font-weight: 600;
            word-break: break-all;
        }

        .copy-btn {
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: 1px solid #667eea;
            background: transparent;
            color: #667eea;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .copy-btn:hover { background: #667eea; color: #fff; }

        .error { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
